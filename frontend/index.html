<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Arixx - Attendance Platform</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Arixx" />
    <meta name="description" content="Attendance tracking and parent communication platform" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Mobile optimizations -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      /* Splash screen */
      #splash { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s; }
      #splash h1 { color: #fff; font-size: 2rem; font-weight: 700; }
      #splash p { color: #64748b; font-size: 0.9rem; }
      #splash.hide { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <!-- Splash screen while app loads -->
    <div id="splash">
      <div style="text-align: center;">
        <h1>Arixx</h1>
        <p>Loading...</p>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker -->
    <script>
      // Hide splash when app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('splash')?.classList.add('hide');
          setTimeout(() => document.getElementById('splash')?.remove(), 300);
        }, 500);
      });

      // Register PWA service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
